site_name: Truthound
site_description: Truthound 3.0 release-grade zero-config validation platform powered by Polars
site_author: SEO DONG GYUN
site_url: https://truthound.netlify.app/

repo_name: seadonggyun4/Truthound
repo_url: https://github.com/seadonggyun4/Truthound
edit_uri: edit/main/docs/

docs_dir: build/public-docs

theme:
  name: material
  language: en
  logo: assets/truthound_icon.png
  favicon: assets/truthound_icon.png
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

validation:
  nav:
    omitted_files: ignore
    absolute_links: ignore
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: warn
    anchors: ignore

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css


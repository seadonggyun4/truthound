site_name: Truthound
site_description: Truthound 3.0 zero-config validation platform powered by Polars
site_author: SEO DONG GYUN
site_url: https://github.com/seadonggyun4/Truthound

repo_name: seadonggyun4/Truthound
repo_url: https://github.com/seadonggyun4/Truthound
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/truthound_icon.png
  favicon: assets/truthound_icon.png
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

validation:
  nav:
    omitted_files: ignore
    absolute_links: ignore
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: warn
    anchors: ignore

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Zero-Config Context: concepts/zero-config.md
      - Plugin Platform: concepts/plugins.md
  - Guides:
      - Reporter SDK: guides/reporter-sdk.md
      - Checkpoints: guides/checkpoints.md
      - Performance and Benchmarks: guides/performance.md
      - Benchmark Methodology: guides/benchmark-methodology.md
      - Workload Catalog: guides/benchmark-workloads.md
      - GX Parity Gate: guides/gx-parity.md
      - Migration to 3.0: guides/migration-3.0.md
  - Legacy:
      - Archive Overview: legacy/index.md
  - ADRs:
      - ADR 001 Validation Kernel: adr/001-validation-kernel.md
      - ADR 002 Plugin Platform: adr/002-plugin-platform.md
      - ADR 003 Result Model: adr/003-result-model.md
      - ADR 004 Migration Compatibility: adr/004-migration-compatibility.md
  - Release Notes:
      - Latest Benchmark Summary: releases/latest-benchmark-summary.md
      - Truthound 3.0 RC1: releases/truthound-3.0-rc1.md
      - Truthound 2.0: releases/truthound-2.0.md
